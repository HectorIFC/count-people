version: 2

updates:
  # GitHub Actions dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "build(deps)"

  # Python dependencies (requirements*.txt)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "build(deps)"
    ignore:
      # Exact version required by MiVOLO — do not bump independently
      - dependency-name: ultralytics
    groups:
      torch:
        patterns:
          - "torch*"
      pytest:
        patterns:
          - "pytest*"
